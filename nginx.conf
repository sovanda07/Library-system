events {
  worker_connections 1024;
}

http {
  # Book Service load balancing between 2 instances
  upstream book_service {
    server book_service_1:3001;
    server book_service_2:3001;
  }

  # Auth Service
  upstream auth_service {
    server auth_service:3000;
  }

  # Borrow Service
  upstream borrow_service {
    server borrow_service:3002;
  }

  server {
    listen 80;

    # Auth routes
    location /auth {
      proxy_pass http://auth_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Book routes — load balanced
    location /books {
      proxy_pass http://book_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Borrow routes
    location /borrow {
      proxy_pass http://borrow_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}